cv:
  name: Pearl Ayem
  label: Lead Environmental Risk Modeller
  email: pearlayem@gmail.com
  location: United Kingdom
  image: ""
  summary: >-
    I'm a climate risk professional working at the intersection of science,
    technology, and strategy. My work spans developing advanced risk models,
    advising on sustainability integration in business and finance, and
    supporting decision-making at both organizational and policy levels.
    I've contributed as a technical and scientific expert, helped shape
    international frameworks with heads of state and policymakers, and worked
    hands-on within start-ups and scale-ups to bring innovative climate
    solutions to market.

  social_networks:
    - network: LinkedIn
      username: pearl-ayem
    - network: GitHub
      username: Pearl-Ayem

  sections:
    Experience:
      - position: Lead Environmental Risk Modeller
        company: Risilience
        location: United Kingdom
        start_date: Apr 2025
        highlights:
          - Lead development of asset-level climate and nature risk models that quantify and forecast physical and transition risks across industries.
          - Design and implement agentic workflows for supply chain risk, reducing release cycles from 8 to 4 weeks.
          - Oversee multidisciplinary teams (modellers, economists, data scientists, engineers) to deliver end-to-end SaaS risk products.
          - Partner with Head of Product on roadmaps, digital twin development, and scaling analytics into market-ready platforms.
          - Build geospatially resolved models using climate scenarios, hazard maps, DEMs, and supply chain data to generate actionable insights.
          - Translate geospatial and climate science into financial risk metrics for insurers, underwriters, and corporates.
          - Apply exposure mapping, portfolio stress-testing, and regulatory alignment to support insurance and asset management clients.

      - position: Senior Climate Risk Modeller
        company: Sillion
        location: United Kingdom
        start_date: Dec 2023
        end_date: Mar 2025
        highlights:
          - Led development for climate risk models for FTSE100 clients, integrating outputs into TPT, CSRD, SECR, TCFD/ISSB, CDP, and GRI reports.
          - Delivered transition risk assessments, scenario analysis, and double materiality evaluations for boards and executive committees.
          - Product Lead for an ESG research tool tracking 600+ companies, integrating KPIs with climate and financial data.
          - Embedded geospatial hazard and transition datasets into financial analytics software to map climate risks to business operations.
          - Led design of backend infrastructure that integrated client data with climate risk models.
          - Managed and mentored analysts/consultants, aligning work with climate risk, disclosure, and sustainability strategy.
          - Expert in Scope 1,2,3 GHG emission models, global reporting standards, and jurisdictional policies.

      - position: Net-Zero Data Specialist
        company: 'Bloomberg L.P (Secondment with <a href="https://www.gfanzero.com/">GFANZ</a> and <a href="https://www.nzdpu.com">NZDPU</a>)'
        start_date: Jul 2022
        end_date: Dec 2023
        highlights:
          - Led data modelling and engineering for the Net-Zero Data Public Utility (NZDPU), a global open-data platform for climate transition.
          - 'Collaborated directly with heads of state including <a href="https://www.ipe.com/news/cop28-proof-of-concept-launched-for-public-net-zero-data-portal/10070455.article">Mark Carney</a> and <a href="https://www.climatedatasc.org/president-emmanuel-macron-and-michael-r-bloomberg-deliver-proof-of-concept-for-groundbreaking-net-zero-data-public-utility-at-cop28/">Emmanuel Macron</a>, UNFCC, and governments of Canada, UK, <a href="https://nzdpu.com/news-and-publications/93eb6a59-8581-4c85-b4e7-4ebc670b17f2?page=2">Switzerland</a> and <a href="https://www.mas.gov.sg/news/media-releases/2023/mas-and-sgx-group-to-collaborate-with-csdc">Singapore</a> to shape climate disclosure policy.'
          - 'Published two high-impact reports for <a href="https://assets.bbhub.io/company/sites/63/2022/09/Recommendations-and-Guidance-on-Financial-Institution-Net-zero-Transition-Plans-November-2022.pdf">GFANZ</a> and <a href="https://assets.bbhub.io/company/sites/71/2022/11/request-for-proposal-2022.pdf">NZDPU</a>, with partners from ISSB and IEA.'
          - Supported CTO with RFP processes, vendor evaluation, and management of engineering contractors from Google to build the NZDPU Proof of Concept.
          - Managed a 40-person analyst team for GFANZ's data launch at COP27, delivering insights used by President Macron and Michael Bloomberg.
          - 'Helped secure partnerships, including with <a href="https://www.cdp.net/en/articles/media/cdp-and-nzdpu-collaborate-to-accelerate-access-to-core-climate-data">CDP</a> for 10,000+ companies to be hosted on the NZDPU platform.'
          - Built ETL pipelines, APIs, and data transformation scripts for climate and emissions data.
          - Developed AI/ML/NLP modules for data collection, validation, and automated net-zero progress tracking.
          - Designed models mapping data across regulatory frameworks (TCFD, CDP, GHGP, PCAF, EFRAG, SBTi), enabling cross-jurisdictional compliance.
          - Delivered briefs and insights on 700 climate KPIs for Bloomberg's CEO to present at COP27.

      - position: Climate Science Researcher
        company: University of Cambridge, British Antarctic Survey
        location: Cambridge, UK
        start_date: Oct 2021
        end_date: Jun 2022
        highlights:
          - Conducted fully-funded research by the Scott Polar Research Institute and the British Antarctic Survey on atmospheric drivers of Antarctic surface melt.
          - Experience with multi-dimensional, geospatial data, academic research, writing papers, and conference presentations.
          - Investigated atmospheric drivers of surface melt in Antarctica using climate models and real-time in-situ data.
          - Experience with climate models (CMIP5 GCMs, RCMs), multi-dimensional, geospatial data, academic research, writing papers, and conference presentations.
          - Technical analysis done in Python, with data from direct in-situ sources, NOAA and Copernicus (ESA).
          - Developed a Convolutional Neural Network (CNN) and performed EOF analysis to identify seasonal melt patterns.
          - Tech stack included xarray, pandas/geopandas, scipy, pyproj, netCDF, HDF5, Rasterio, GDAL, Shapely, sklearn, EOF, Fiona, plotly, cartopy, matplotlib etc.
          - 'Featured in media on Cambridge''s <a href="https://www.caths.cam.ac.uk/polar-impact">website</a> and <a href="https://www.instagram.com/p/CWnS3Lwogyl/?utm_source=ig_web_copy_link">social media</a> for my work on diversity and climate research.'

      - position: Brand Manager, Sustainability
        company: P.G.A. Hospitality
        start_date: Sep 2018
        end_date: Oct 2021
        highlights:
          - Worked as an independent contractor with the CEO to drive sustainable business development, and lead a team of 10.
          - Achieved significant growth; increased revenue by 233%, raised 1.5 million CAD in investment, increased profits by 31%.
          - Proactively secured contracts with local, sustainable suppliers to mitigate supply chain challenges during the pandemic.
          - Developed business plans, marketing materials, seasonal menus.
          - 'Wrote and won an <a href="https://www.tricitynews.com/local-news/beanery-wins-contract-for-new-burke-mountain-cafe-3986899">RFP</a> bid for a <a href="https://burkevillage.ca/2021/07/29/cafe-tenant-announced-for-burke-mountain-village-discovery-center/">new location</a>.'
          - 'Got the business recognized for excellence, earning <a href="https://www.instagram.com/p/CVlkVIfM44V/?igshid=YmMyMTA2M2Y=">9 awards</a> and a position in Greater Vancouver''s <a href="https://www.instagram.com/p/Bvr0az7hsSt/?igshid=YmMyMTA2M2Y=">Top 30 cafes</a>.'

      - position: Teaching Assistant in Computer Science
        company: University of British Columbia
        location: Vancouver, Canada
        start_date: Dec 2016
        end_date: Jun 2020
        highlights:
          - Managed a team of 18 TAs as the Head Teaching Assistant of Computer Science.
          - Ran lectures for ~1000 students in Python, C++; created and graded course modules and labs.
          - 'Helped pilot a <a href="https://pearl-ayem.github.io/projects/contrast_stretching/">new data science course</a>; created course modules in Climate Data Computing and taught about contrast stretching using open-source satellite imagery.'

      - position: Research Assistant
        company: University of British Columbia
        location: Vancouver, Canada
        start_date: Dec 2016
        end_date: May 2020
        highlights:
          - Worked with several research labs in the Earth, Ocean and Atmospheric Science Department at the University of British Columbia.
          - 'Used open-source satellite imagery and ECMWF Climate reanalysis data to study the role of glacial katabatic winds on <a href="https://pearl-ayem.github.io/projects/cloud_streets_clustering/">cloud formation over Greenland</a>.'
          - Employed Python libraries for cloud type differentiation and formation cluster analysis (e.g., pandas, numpy, scipy, rasterio, sklearn, fiona).
          - Collaborated with the Atmospheric Science Department to create course modules in Climate Data Computing.
          - Designed ETL pipelines to retrieve MODIS, GOES-16/17, and Landsat (7 & 8) data from AWS's EC2 cloud computing and virtual platforms.
          - Worked in UBC's glaciology lab, utilizing image clustering, PCA, Sobel edge detection, and Self-Organizing Maps to detect melt season streamflow across Canada.
          - Conducted eddy covariance measurements during the Buckley Bay wildfires, comparing them with NASA Aerosol Optical Depth data to test diffused radiation fertilization.
          - Collected, identified, and analyzed phytoplankton in the Burrard Inlet, studying their distribution, chlorophyll levels, and carbon sink role.
          - Analyzed plankton distributions, temperature, and salinity measurements using MATLAB to investigate climate change's impact on productivity.
          - Constructed and set up weather sensors to study blue carbon and analyze the urban heat island effect, demonstrating proficiency in meteorological field instruments and adherence to WMO standards.
          - 'Languages — Python, JAVA, C++, Matlab. File formats — NetCDF, GRIB, TIFF, CSV, Excel, text, JSON, XML. Stats/ML — PCA, Edge detection, Self-Organizing Maps, CNNs, Empirical Orthogonal Function (EOF).'

      - position: Geospatial Engineer
        company: UAViation Aerial Solutions
        start_date: Jul 2018
        end_date: Sep 2019
        highlights:
          - Team Lead for the software team responsible for flight automation app development.
          - Experience with project feasibility analysis.
          - Project Lead on LIDAR drone mapping operations and GIS post-processing.
          - CEO's right hand in client meetings. My work led to a successful exit (company acquisition — now part of Volatus Aerospace).
          - Experience working with Android Studio, REST APIs, Google Maps API and DJI's UX SDK.
          - Point of contact for research-based operations, geospatial analysis and post-processing using Pix4D, ArcGIS and QGIS.
          - Used C++, Java, and Python to tackle photogrammetry and LiDAR flight mapping problems across Canada.
          - Completed 18 projects in a year with government bodies, natural resource sectors, academia and private industry combined.

      - position: Robotics Instructor
        company: Science World British Columbia
        location: Vancouver, Canada
        start_date: Sep 2014
        end_date: Oct 2018
        highlights:
          - Robotics Instructor for youth aged 9 to 14.
          - Introduced children and teens to programming, system design, electrical circuits, the VEX Robotics Design System, 3-D printing principles and Engineering Design procedures.
          - Encouraged interest in STEM, teamwork, leadership and problem-solving.
          - Mentor and Instructor for VEX Level 1, VEX Level 2, and VEX Competitive programs at Science World BC.

    Education:
      - studyType: MPhil in Polar Atmospheric Science and Data Modelling
        institution: University of Cambridge
        location: Cambridge, UK
        start_date: 2021
        end_date: 2022
        highlights:
          - 'Studied the George VI Ice Shelf (GVIIS), Antarctica under the supervision of <a href="https://www.spri.cam.ac.uk/people/willis/">Dr. Ian Willis</a> and <a href="https://www.bas.ac.uk/profile/acrki/">Amélie Kirchgaessner</a>.'
          - 'Worked with the <a href="https://www.projects.science.uu.nl/iceclimate/models/racmo-model.php">RACMO 2</a> climate model and in-situ data to find the atmospheric drivers of melt on the GVIIS.'
          - Created a CNN and carried out EOF analysis to detect seasonal patterns of melt.
          - Wrote research essays studying the Stratospheric Polar Vortex and its impact on weather extremes in the Northern Hemisphere.
          - Won the Scott Polar Scholarship — a full scholarship awarded to the top applicant.
          - 'My work is used as <a href="https://twitter.com/PolarImpact/status/1463252358121631753?s=20">course curriculum</a> at the University of Cambridge''s graduate-level MPhil classes.'
          - 'Featured on Cambridge''s <a href="https://www.caths.cam.ac.uk/polar-impact">website</a> and <a href="https://www.instagram.com/p/CWnS3Lwogyl/?utm_source=ig_web_copy_link">social media</a> for my work on equality and climate research.'

      - studyType: BSc Atmospheric Science (Minor in Computer Science)
        institution: University of British Columbia
        location: Vancouver, Canada
        start_date: 2016
        end_date: 2020
        highlights:
          - Graduated Top of Class.
          - Used weather and satellite data to study storms, climate change, glaciers, plant health, and air quality.
          - Helped UBC's Climate Data Computing course set up infrastructure to let students run MODIS, GOES-16/17, and Landsat (7 & 8) data in AWS.
          - 'Carried out field work and data analysis on plankton and published results to the <a href="https://phytoplankton.eoas.ubc.ca/">phytopedia project</a>.'
          - Built, deployed, and used custom weather sensors to WMO standards.

    Volunteer:
      - position: Co-Organizer and DEI Expert
        company: Polar Impact
        start_date: Oct 2021
        end_date: Mar 2023
        highlights:
          - Co-run an NGO as a volunteer that supports BIPOC professionals in the polar research community.
          - Helped write grant proposals that won a cumulative of £50,000 from National Science Foundation, UKRI and National Geographic.
          - Organized COP26 speakers for climate justice talks.
          - 'My work is used as <a href="https://twitter.com/PolarImpact/status/1463252358121631753?s=20">course curriculum</a> at the University of Cambridge''s graduate-level MPhil classes.'

