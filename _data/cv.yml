    Projects:
      - name: MPhil Dissertation — University of Cambridge
        url: /thesis/
        summary: Investigating atmospheric drivers of surface melt on the George VI Ice Shelf (GVIIS) in Antarctica over 32 years. Analysed up to 1.73 billion geospatial data points; built a Convolutional Neural Network and conducted EOF analysis to predict clustered weather patterns influencing melt.
        highlights:
          - 'Tech stack: Python, xarray, rasterio, GDAL, geopandas, fiona, shapely, pyproj, scipy, sklearn, eofs, cartopy, matplotlib.'
          - Supervised by Professor Ian Willis (Scott Polar Research Institute) and Dr Amélie Kirchgaessner (British Antarctic Survey).
      - name: Undergraduate Thesis — University of British Columbia
        summary: Studied the significance of glacial katabatic winds on cloud formation over Greenland. Used MODIS, Landsat 7/8 and GOES-16/17 imagery, image clustering, Principal Component Analysis (PCA), Sobel edge detection, a custom neural network, and Self-Organizing Maps to detect mesoscale cellular convection. Final score 93%. Supervised by Dr Ian McKendry.
      - name: Plant Productivity During the Buckley Bay Wildfires
        summary: 'Modelled plant productivity during the Buckley Bay wildfires using NASA Aerosol Optical Depth data to test diffused-radiation fertilisation (contributed to McKendry et al., 2019). Used to study the carbon cycle during wildfire events across British Columbia.'
      - name: AWS-Hosted GOES Cloud Computing Pipeline
        summary: Built ETL pipelines on AWS EC2 servers and virtual platforms to ingest GOES data via Jupyter notebooks pulling from NOAA's S3 bucket. Produced true and pseudo-colour imagery, climate animations, and maps of rain rate, radiances and reflection for deep convective storms.
      - name: Carbon Flux Weather Stations, Vancouver
        summary: Constructed and set up weather stations to detect carbon flux from bogs in Vancouver using eddy covariance methods. Trained on operating, calibrating and maintaining meteorological field instruments to WMO standards.
      - name: Hybrid Photovoltaic-Thermoelectric Solar Cell
        summary: Invented a hybrid photovoltaic and thermoelectric solar cell that produced electricity at 19% higher efficiency than conventional cells. Excess heat from the photovoltaic cell was absorbed by the heating side of a Peltier tile, while the cooling side was passively cooled by a thermosiphon to reduce hot spots. Selected as the top project in the Innovation category from over 900 projects nationwide at the Canadian National Science and Engineering Fair.

